name: lint
on:
  push:
jobs:
  lint:
    runs-on: ubuntu-24.04-arm
    steps:
    - name: checkout
      uses: actions/checkout@v6.0.2
    - name: setupBun
      uses: oven-sh/setup-bun@v2.2.0
    - name: install
      run: bun install --frozen-lockfile
    - name: eslint
      run: bunx --bun eslint .
